<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#070112">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href="data:,">
<title>NEON VOID — cyberpunk sector defense</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="scanlines"></div>
  <div id="vignette"></div>
  <div id="flash"></div>

  <div id="hud" class="hidden">
    <div class="hud-col left">
      <div id="score">0</div>
      <div id="combo"></div>
    </div>
    <div class="hud-col right">
      <div id="hearts"></div>
      <div id="weapon">PULSE BLASTER</div>
      <div id="boosts"></div>
    </div>
  </div>

  <div id="bossbar" class="hidden">
    <div id="bossname">⚠ SECTOR WARDEN</div>
    <div class="bar"><div id="bossfill"></div></div>
  </div>

  <div id="banner" class="hidden">
    <div id="banner-main"></div>
    <div id="banner-sub"></div>
  </div>

  <div id="screen-title" class="screen">
    <div class="title-card">
      <div class="overline">ORBITAL DEFENSE GRID // SECTOR 7</div>
      <h1>NEON&nbsp;VOID</h1>
      <div class="sub">night city is counting on you</div>
      <button id="btn-start" class="neon-btn">ENGAGE</button>
      <div class="hint">drag anywhere to fly · weapons fire automatically</div>
      <div id="best" class="best"></div>
    </div>
  </div>

  <div id="screen-over" class="screen hidden">
    <div class="title-card">
      <h1 class="red">SIGNAL&nbsp;LOST</h1>
      <div class="sub">ship destroyed over night city</div>
      <div class="final"><span>SCORE</span><b id="final-score">0</b></div>
      <button id="btn-retry" class="neon-btn">RE-ENGAGE</button>
    </div>
  </div>

  <div id="screen-clear" class="screen hidden">
    <div class="title-card">
      <h1 class="green">SECTOR&nbsp;CLEARED</h1>
      <div class="sub">the warden is down · night city breathes</div>
      <div class="final"><span>SCORE</span><b id="clear-score">0</b></div>
      <div class="final small"><span>MAX CHAIN</span><b id="clear-chain">×0</b></div>
      <button id="btn-again" class="neon-btn">FLY AGAIN</button>
    </div>
  </div>
</div>
<script src="js/utils.js"></script>
<script src="js/audio.js"></script>
<script src="js/input.js"></script>
<script src="js/particles.js"></script>
<script src="js/background.js"></script>
<script src="js/entities.js"></script>
<script src="js/enemies.js"></script>
<script src="js/game.js"></script>
<script src="js/main.js"></script>
</body>
</html>
